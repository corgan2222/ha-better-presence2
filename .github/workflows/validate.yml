---
name: Validate

"on":
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  # https://developers.home-assistant.io/blog/2020/04/16/hassfest
  hassfest:
    name: Hassfest validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        # yamllint disable rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        # yamllint enable rule:line-length
        with:
          persist-credentials: false

      - name: Run hassfest validation
        # yamllint disable rule:line-length
        uses: home-assistant/actions/hassfest@f4ca6f671bd429efb108c0f2fa0ae8af0215986c # master
        # yamllint enable rule:line-length

  hacs: # https://github.com/hacs/action
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - name: Run HACS validation
        uses: hacs/action@d556e736723344f83838d08488c983a15381059a # 22.5.0
        with:
          category: integration
          # Remove this 'ignore' key when you have added brand images for
          # your integration. See docs:
          # https://developers.home-assistant.io/docs/creating_integration_file_structure
          # ignore: brands
